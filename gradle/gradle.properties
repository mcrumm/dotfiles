# Gradle build optimization for Android development
# Symlinked from dotfiles to ~/.gradle/gradle.properties

# Parallel project execution
org.gradle.parallel=true

# Build caching
org.gradle.caching=true

# Configuration cache (significant speedup on repeat builds)
org.gradle.configuration-cache=true

# Keep the daemon running between builds
org.gradle.daemon=true

# JVM args: 4GB heap, parallel GC for build performance
org.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC

# Kotlin daemon memory
kotlin.daemon.jvmargs=-Xmx2g
